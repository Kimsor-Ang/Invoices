<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports - Invoice System</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/report.css">
  </head>
  <body>
    <!-- Navigation -->
    <nav>
      <a href="/">Create Invoice</a>
      <a href="/invoices">View Invoices</a>
      <a href="/products">Manage Products</a>
      <a href="/report">📊 Report</a>
    </nav>
    <div class="report-container">
      <!-- Report Header -->
      <div class="report-header">
        <h1>📊 Reports</h1>
        <div>
          <!-- <button class="export-btn">
            <a href="/backup" style="color: white; text-decoration: none; width: 100%; height: 100%; display: flex;">
              ⬇️ Database
            </a>
          </button> -->
          <button class="export-btn" onclick="exportAllData()">
            ⬇️ Export All Data
          </button>
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="summary-grid">
        <div class="summary-card invoices">
          <h3>Total Invoices</h3>
          <div class="value" id="totalInvoices">-</div>
        </div>
        <div class="summary-card revenue">
          <h3>Total Revenue</h3>
          <div class="value" id="totalRevenue">$0.00</div>
        </div>
        <div class="summary-card items">
          <h3>Total Items</h3>
          <div class="value" id="totalItems">-</div>
        </div>
        <div class="summary-card products">
          <h3>Products</h3>
          <div class="value" id="totalProducts">-</div>
        </div>
      </div>

      <!-- Recent Invoices Section -->
      <div class="chart-section">
        <h2>Recent Invoices</h2>
        <div id="recentInvoicesContainer" class="loading">
          Loading invoices...
        </div>
      </div>

      <!-- FOC Items Section -->
      <div class="chart-section">
        <h2>Free On Consignment (FOC) Items</h2>
        <div id="focItemsContainer" class="loading">Loading FOC items...</div>
      </div>
    </div>

    <script src="/js/report.js"></script>
  </body>
</html>
