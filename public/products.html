<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products Management - Invoice System</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/product.css">
  </head>
  <body>
    <!-- Navigation -->
    <nav>
      <a href="/">Create Invoice</a>
      <a href="/invoices">View Invoices</a>
      <a href="/products">Manage Products</a>
      <a href="/report">📊 Report</a>
    </nav>
    <div class="products-container">
      <!-- Add Product Section -->
      <div class="section">
        <h2>Add New Product</h2>
        <div class="success-message" id="successMsg"></div>
        <div class="error-message" id="errorMsg"></div>

        <form id="productForm">
          <div class="form-group">
            <label>SKU (Product Code)</label>
            <input type="text" id="sku" placeholder="e.g., SKU001" required />
          </div>

          <div class="form-group">
            <label>Product Name</label>
            <input
              type="text"
              id="productName"
              placeholder="e.g., Widget A"
              required
            />
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea
              id="description"
              placeholder="Product description (optional)"
              rows="3"
            ></textarea>
          </div>

          <div
            style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px"
          >
            <div class="form-group">
              <label>Bag Price ($)</label>
              <input
                type="number"
                id="bagPrice"
                placeholder="0.00"
                min="0"
                step="0.01"
                required
              />
            </div>
            <div class="form-group">
              <label>Streamer Price ($)</label>
              <input
                type="number"
                id="streamerPrice"
                placeholder="0.00"
                min="0"
                step="0.01"
              />
            </div>

            <div class="form-group">
              <label>Middle Unit</label>
              <select id="middleUnit" required>
                <option value="" selected disabled>Select BOX/LINER</option>
                <option value="BOX">BOX</option>
                <option value="LINER">LINER</option>
              </select>
            </div>
            <div class="form-group">
              <label>Box/Liner Price ($)</label>
              <input
                type="number"
                id="boxPrice"
                placeholder="0.00"
                min="0"
                step="0.01"
                required
              />
            </div>

            <div class="form-group">
              <label>CTN Price ($)</label>
              <input
                type="number"
                id="ctnPrice"
                placeholder="0.00"
                min="0"
                step="0.01"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary">Add Product</button>
          <button type="reset" class="btn btn-secondary">Clear</button>
        </form>
      </div>

      <!-- Products List Section -->
      <div class="section">
        <h2>Product Inventory</h2>
        <div
          id="productsList"
          class="products-list"
          style="display: flex; justify-content: center; align-items: center"
        >
          <div class="no-products">Loading products...</div>
        </div>
      </div>
    </div>

    <!-- Edit Product Modal -->
  <div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Edit Product</h2>
      <button type="button" class="close-btn" onclick="closeEditModal()">
        &times;
      </button>
    </div>

    <form id="editForm">
      <input type="hidden" id="editProductId" />

      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="editProductName" required />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="editDescription" rows="3"></textarea>
      </div>

      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px">

        <!-- BAG -->
        <div class="form-group">
          <label>Bag Price ($)</label>
          <input type="number" id="editBagPrice" min="0" step="0.01" required />
        </div>

        <!-- STREAMER -->
        <div class="form-group">
          <label>Streamer Price ($)</label>
          <input type="number" id="editStreamerPrice" min="0" step="0.01" />
        </div>

        <!-- BOX / LINER -->
        <div class="form-group">
          <label id="editBoxLabel" style="text-transform: capitalize !important;">Box/Liner Price ($)</label>
          <input type="number" id="editBoxPrice" min="0" step="0.01" required />
        </div>

        <!-- CTN -->
        <div class="form-group">
          <label>CTN Price ($)</label>
          <input type="number" id="editCtnPrice" min="0" step="0.01" required />
        </div>

      </div>

      <button type="submit" class="btn btn-primary">Update Product</button>
    </form>
  </div>
</div>

    <script src="js/products.js"></script>
  </body>
</html>
