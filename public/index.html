<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Invoice - Thermal Printer App</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav>
      <a href="/">Create Invoice</a>
      <a href="/invoices">View Invoices</a>
      <a href="/products">Manage Products</a>
      <a href="/report">📊 Report</a>
    </nav>

    <div class="container">
      <h1>Create Invoice</h1>

      <!-- Messages -->
      <div id="messageContainer"></div>

      <!-- Invoice Form -->
      <form id="invoiceForm">
        <!-- Invoice Details -->
        <div class="form-group">
          <label for="invoiceNumber">Invoice Number:</label>
          <input type="text" id="invoiceNumber" readonly />
        </div>

        <!-- Items Section -->
        <div class="items-section">
          <div class="items-title">Items</div>
          <div id="itemsContainer"></div>
          <button
            type="button"
            class="btn btn-add-item"
            onclick="app.addItemRow()"
          >
            + Add Item
          </button>
        </div>

        <!-- Totals -->
        <div class="form-group">
          <label
            >Total Amount:
            <span id="totalAmount" style="font-weight: bold; font-size: 25px"
              >$ 0.00 = ៛ 0</span
            ></label
          >
        </div>

        <!-- Action Buttons -->
        <div style="margin-top: 20px">
          <button type="submit" class="btn btn-success">Save Invoice</button>
          <button type="reset" class="btn btn-secondary">Clear Form</button>
        </div>
      </form>

      <!-- Receipt Preview for Printing -->
      <div id="receiptContainer" style="display: none"></div>
    </div>

    <!-- JavaScript -->
    <script src="/js/app.js"></script>
  </body>
</html>
